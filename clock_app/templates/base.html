<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TimeTrack{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-in  { background: #dcfce7; border-color: #16a34a; color: #15803d; }
        .status-out { background: #f1f5f9; border-color: #94a3b8; color: #475569; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <nav class="bg-slate-900 text-white shadow-xl">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <span class="text-lg font-bold tracking-wide">TimeTrack</span>
            </div>
            <div class="flex gap-1">
                <a href="/"
                   class="px-4 py-2 rounded-lg text-sm font-medium transition-colors
                          {% if request.path == '/' %}bg-blue-600 text-white{% else %}text-slate-300 hover:bg-slate-700 hover:text-white{% endif %}">
                    Dashboard
                </a>
                <a href="/records"
                   class="px-4 py-2 rounded-lg text-sm font-medium transition-colors
                          {% if request.path == '/records' %}bg-blue-600 text-white{% else %}text-slate-300 hover:bg-slate-700 hover:text-white{% endif %}">
                    Records
                </a>
                <a href="/admin"
                   class="px-4 py-2 rounded-lg text-sm font-medium transition-colors
                          {% if request.path == '/admin' %}bg-blue-600 text-white{% else %}text-slate-300 hover:bg-slate-700 hover:text-white{% endif %}">
                    Admin
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
